apiVersion: playground/v1
kind: VmRole
metadata:
  name: deployment-target
  description: VM that receives shipped bundles and deploys via barak-deploy.

spec:
  extends: docker-host
  capabilities:
    docker: true
    deployment_target: true
  provisioners:
    # `docker` listed explicitly because the resolver's list-replace
    # semantics drop the parent's `[docker]` from `docker-host`. Both
    # docker_tunneler and barak_deploy_agent need docker present.
    - ansible_role: docker
    - ansible_role: docker_tunneler
    - ansible_role: ssh_keypair_receiver
    - ansible_role: barak_deploy_agent
