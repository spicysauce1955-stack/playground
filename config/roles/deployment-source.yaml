apiVersion: playground/v1
kind: VmRole
metadata:
  name: deployment-source
  description: VM that stages and ships barak-deploy wrapper bundles.

spec:
  extends: docker-host
  capabilities:
    docker: true
    deployment_source: true
  provisioners:
    # `docker` listed explicitly because the resolver's list-replace
    # semantics drop the parent's `[docker]` from `docker-host`.
    # docker_tunneler runs containers, so docker is a hard prereq.
    - ansible_role: docker
    - ansible_role: docker_tunneler
    - ansible_role: ssh_keypair_generator
    - ansible_role: barak_deploy_staging
