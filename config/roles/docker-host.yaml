apiVersion: playground/v1
kind: VmRole
metadata:
  name: docker-host
  description: Generic node configured with Docker engine, Compose, and Swarm capability.

spec:
  extends: generic-node
  resources:
    vcpu: 2
    memory_mb: 4096
    disk_gb: 40
  capabilities:
    docker: true
    compose: true
    swarm: true
  provisioners:
    - ansible_role: docker
