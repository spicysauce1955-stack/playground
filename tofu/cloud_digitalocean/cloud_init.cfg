#cloud-config
# Hostname / FQDN from the lab's VM name and dns_domain. Belt-and-
# braces with the authoritative DNS records libvirt serves via
# dnsmasq — this side makes `hostname` / `hostnamectl` return the
# right value locally and ensures DHCP requests advertise the
# correct name.
hostname: ${vm_name}
fqdn: ${vm_name}.${dns_domain}
preserve_hostname: false

# Default cloud-init user creation and SSH key injection
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

# Update packages non-interactively
package_update: true
package_upgrade: true
package_reboot_if_required: false

# Ensures ssh starts
ssh_pwauth: false
