[defaults]
# Skip the interactive "yes/no" prompt the first time the controller
# meets a freshly-booted VM. Combined with `UserKnownHostsFile=/dev/null`
# below, this also tolerates IP reuse across destroy/apply cycles
# (the new VM has a different host key on the same IP).
host_key_checking = False
# Ubuntu Noble ships python3 but no /usr/bin/python; auto_silent picks
# the right interpreter without spamming a deprecation warning on
# every host.
interpreter_python = auto_silent

[ssh_connection]
# ControlMaster/Persist reuses one TCP+SSH session per host across
# tasks — without it every task re-handshakes, which on a slow lab is
# minutes of cumulative overhead. UserKnownHostsFile=/dev/null +
# StrictHostKeyChecking=accept-new keeps `playground reset` →
# `playground apply` from refusing to connect when a VM's host key
# changes but the IP is reused.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=accept-new
# Pipelining runs the module body inline through the SSH session
# instead of uploading a script to /tmp via sftp/scp. Roughly halves
# task wall time on a typical apply.
pipelining = True
