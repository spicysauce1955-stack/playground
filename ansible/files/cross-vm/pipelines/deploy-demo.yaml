# Cross-VM demo deploy pipeline. Deployed at
# /etc/barak-deploy/pipelines/deploy-demo.yaml on VM B (deployment target).
# Dispatched by the filesystem trigger in ../triggers.yaml whenever a
# `*.tar.gz` lands in /var/spool/deploys/.
#
# Flow: bundle.extract (uses docker-tunneler unwrap) → docker.load_image
# (loads the inner deployable image from the extracted tree) → fs.copy
# (places the config file) → docker.run (starts the container).
#
# The wrapper-vs-deployable rule (CLAUDE.md, fifth core constraint) holds:
# the OUTER tar (/var/spool/deploys/demo-app.tar.gz) is the wrapper, consumed
# by bundle.extract. The INNER tar (extracts/demo-app/images/hello.tar) is
# the deployable, consumed by docker.load_image. Two distinct files at two
# distinct paths.

name: deploy-demo
description: |
  Extract the demo-app wrapper bundle shipped from VM A; load the inner
  image into the local Docker daemon; place the config file; run the
  container. Re-running on the same bundle is idempotent (bundle.extract
  skip-on-manifest-match + docker.run skip-on-name+digest-match).

steps:
  - name: unwrap
    action: bundle.extract
    with:
      bundle: demo-app                                       # via bundles.yaml
      dest_dir: /var/lib/barak-deploy/extracts/demo-app
      overwrite: false                                       # skip if manifest matches

  - name: load
    action: docker.load_image
    with:
      tar_path: ${steps.unwrap.output.dest_dir}/images/hello.tar

  - name: place-config
    action: fs.copy
    with:
      src: ${steps.unwrap.output.dest_dir}/configs/hello.conf
      dest: ${app_dir}/hello.conf
      mode: "0644"
      overwrite: false                                       # sha256-compare; skip if unchanged

  - name: run
    action: docker.run
    with:
      name: hello
      image: ${steps.load.output.loaded_images[0]}
      restart: unless-stopped
      volumes:
        - ${app_dir}:/etc/hello:ro
