# Operator bundle catalog for the cross-VM demo. Deployed at
# /etc/barak-deploy/bundles.yaml on VM B (the deployment target).
#
# The `demo-app` bundle is shipped FROM VM A (the central / sender) TO this VM
# by `/usr/local/bin/ship-deploy.sh` running on A. See docs/cookbook.md Recipe 8
# for the end-to-end pattern and docs/playground-requirements.md for the
# playground-side wiring (VM A staging + ship script + Ansible roles).
#
# `tar_path` is resolved at load time against THIS file's directory — but here
# we use an absolute path because the tar lands in the watched drop dir,
# not next to this catalog file.

bundles:
  - name: demo-app
    tar_path: /var/spool/deploys/demo-app.tar.gz
    payload_dir: /payload
    description: |
      Cross-VM demo bundle. Contains a deployable image (images/hello.tar)
      and a config file (configs/hello.conf). Shipped from VM A by
      docker-tunneler over SCP and dropped into /var/spool/deploys/ via an
      atomic .partial rename.
    expected_files:
      - images/hello.tar
      - configs/hello.conf
