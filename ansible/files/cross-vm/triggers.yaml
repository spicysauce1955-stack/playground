# Trigger config for the cross-VM demo. Deployed at
# /etc/barak-deploy/triggers.yaml on VM B (the deployment target). Read by
# `barak-deploy watch` (the systemd service from packaging/barak-deploy.service).
#
# One filesystem trigger watching the canonical drop dir for shipped bundles.
# The .partial rename done by VM A's ship-deploy.sh script (see Recipe 8) means
# the tar appears atomically; `stable_for_s: 5.0` is defence in depth in case
# the operator's transport doesn't do atomic rename.

triggers:
  - name: ship-drop
    type: filesystem
    pipeline: pipelines/deploy-demo.yaml
    config:
      path: /var/spool/deploys
      glob: "*.tar.gz"
      poll_interval_s: 2.0
      # Require the file to stop growing for 5s before claiming. Belt-and-braces
      # over the atomic .partial rename pattern.
      stable_for_s: 5.0
      archive_dir: /var/spool/deploys/archive
