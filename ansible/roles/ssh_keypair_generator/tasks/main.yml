---
# Generate an ed25519 keypair for the operator user on the source VM.
# Stash the public half as a host fact (`ship_pubkey`) so the receiver
# play (running later, against a different host group) can copy it via
# `hostvars[<source>].ship_pubkey`.
#
# Pair role: `ssh_keypair_receiver` reads this fact.

- name: Generate ed25519 keypair for the ubuntu user
  community.crypto.openssh_keypair:
    path: /home/ubuntu/.ssh/id_ed25519
    type: ed25519
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  register: pg_ssh_keypair

- name: Stash the public key on the controller for the receiver
  ansible.builtin.set_fact:
    ship_pubkey: "{{ pg_ssh_keypair.public_key }}"
