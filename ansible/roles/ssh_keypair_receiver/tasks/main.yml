---
# Authorize every paired source VM's public key in this host's
# `~ubuntu/.ssh/authorized_keys`. Sources are picked up via the
# `deployment_source` inventory group (emitted automatically by
# the per-VM-role grouping in `render_inventory`).
#
# Pair role: `ssh_keypair_generator` sets the fact this reads.

- name: Authorize each deployment source's public key
  ansible.posix.authorized_key:
    user: ubuntu
    key: "{{ hostvars[item].ship_pubkey }}"
    state: present
  loop: "{{ groups['deployment_source'] | default([]) }}"
  when: hostvars[item].ship_pubkey is defined
