---
# Stage the barak-deploy demo artifacts on the source VM:
#  - /opt/staging/images/hello.tar  (an alpine retag — deterministic)
#  - /opt/staging/configs/hello.conf
#  - /usr/local/bin/ship-deploy.sh  (driver script the operator runs)
#
# Idempotent: each step has a `creates:` guard or is naturally
# convergent. The pipeline's "skipped: true" idempotency check in the
# pytest harness depends on this.

- name: Ensure staging directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  loop:
    - /opt/staging
    - /opt/staging/images
    - /opt/staging/configs

- name: Pull alpine:3.19 (last network egress; later steps work offline)
  community.docker.docker_image:
    name: alpine:3.19
    source: pull

- name: Retag alpine as hello:demo
  ansible.builtin.command: docker tag alpine:3.19 hello:demo
  changed_when: true

- name: Save hello:demo as a tar
  ansible.builtin.command: docker save hello:demo -o /opt/staging/images/hello.tar
  args:
    creates: /opt/staging/images/hello.tar

- name: Drop sample hello.conf
  ansible.builtin.copy:
    dest: /opt/staging/configs/hello.conf
    owner: ubuntu
    group: ubuntu
    mode: "0644"
    content: |
      # Sample hello.conf shipped from central → target.
      greeting = hello from {{ inventory_hostname }}
      shipped_at = {{ ansible_date_time.iso8601 }}

- name: Drop ship-deploy.sh driver script
  ansible.builtin.copy:
    dest: /usr/local/bin/ship-deploy.sh
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      TARGET_HOST="${TARGET_HOST:-target}"
      TARGET_USER="${TARGET_USER:-ubuntu}"
      STAGING="/opt/staging"
      WORK=$(mktemp -d)
      trap 'rm -rf "$WORK"' EXIT

      tunneler wrap "$STAGING" -o "$WORK/demo-app.tar.gz" --payload-dir /payload
      tunneler ship "$WORK/demo-app.tar.gz" \
        --transport scp \
        --destination "scp://${TARGET_USER}@${TARGET_HOST}:/var/spool/deploys/demo-app.tar.gz.partial"
      ssh -o StrictHostKeyChecking=accept-new "${TARGET_USER}@${TARGET_HOST}" \
        "mv /var/spool/deploys/demo-app.tar.gz.partial /var/spool/deploys/demo-app.tar.gz"
