---
# Deploy `type: container` workloads scheduled on this host by the
# playground planner. The list is JSON-encoded into the `pg_workloads`
# host variable by `playground inventory render`.
#
# Idempotent: `community.docker.docker_container` skips a no-op when
# the desired state already matches. Re-running `playground apply`
# converges without churn.

- name: Parse pg_workloads JSON payload
  ansible.builtin.set_fact:
    # The rendered inventory may hand this over as a JSON STRING, or — when
    # Ansible auto-parses the single-quoted `.ini` value — as an already
    # decoded LIST. `from_json` only accepts a string, so guard it (BUG-6):
    # parse a string, pass a list through unchanged.
    pg_workloads_parsed: >-
      {{ pg_workloads if (pg_workloads is not string)
         else (pg_workloads | from_json) }}
  when: pg_workloads is defined

- name: Skip when no workloads scheduled
  ansible.builtin.meta: end_host
  when: (pg_workloads_parsed | default([])) | length == 0

- name: Deploy container workloads
  community.docker.docker_container:
    name: "{{ item.name }}"
    image: "{{ item.source }}"
    state: started
    restart_policy: unless-stopped
    published_ports: "{{ item.ports | default([]) }}"
    volumes: "{{ item.volumes | default([]) }}"
    env: "{{ item.environment | default({}) }}"
  loop: "{{ pg_workloads_parsed }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.type == 'container'
