---
# Deploy the laboratory deferred-scheduler (idempotent; re-running
# `playground apply` on a converged host reports changed=0 except the
# repo-update task when upstream moved).

# The defaults are lazy lookups re-evaluated at every reference; freeze
# them once so each controller-side file is read a single time per run.
- name: Resolve controller-side secrets once (values never logged)
  ansible.builtin.set_fact:
    lab_scheduler_vast_api_key: "{{ lab_scheduler_vast_api_key }}"
    lab_scheduler_r2_endpoint: "{{ lab_scheduler_r2_endpoint }}"
    lab_scheduler_r2_bucket: "{{ lab_scheduler_r2_bucket }}"
    lab_scheduler_aws_access_key_id: "{{ lab_scheduler_aws_access_key_id }}"
    lab_scheduler_aws_secret_access_key: "{{ lab_scheduler_aws_secret_access_key }}"
  no_log: yes

# No no_log here: the assert handles no secret VALUES (a failed `that:`
# prints the expression, not the data), and censoring would hide fail_msg.
- name: Assert controller-side secrets resolved
  ansible.builtin.assert:
    that:
      - lab_scheduler_vast_api_key | length > 0
      - lab_scheduler_r2_endpoint | length > 0
      - lab_scheduler_aws_access_key_id | length > 0
      - lab_scheduler_aws_secret_access_key | length > 0
    fail_msg: >-
      Missing scheduler secrets on the controller: need
      {{ lab_scheduler_vast_key_file }}, {{ lab_scheduler_r2_credentials_file }}
      and $LAB_R2_ENDPOINT exported before `playground apply lab-scheduler`.

# curl/ca-certificates come from the common role's baseline play.
- name: Install prerequisites
  ansible.builtin.apt:
    name: [git, rsync]
    state: present
    cache_valid_time: 3600

- name: Create and activate swapfile (skypilot import headroom on a 1GB droplet)
  ansible.builtin.shell: |
    set -e
    fallocate -l {{ lab_scheduler_swap_mb }}M /swapfile
    chmod 600 /swapfile
    mkswap /swapfile
    swapon /swapfile
  args:
    creates: /swapfile

- name: Persist swapfile across reboots
  ansible.posix.mount:
    src: /swapfile
    path: none
    fstype: swap
    opts: sw
    state: present

- name: Create service user
  ansible.builtin.user:
    name: "{{ lab_scheduler_user }}"
    shell: /bin/bash

- name: Install uv to /usr/local/bin
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
  args:
    creates: /usr/local/bin/uv

- name: Create repo dir owned by the service user
  ansible.builtin.file:
    path: "{{ lab_scheduler_home }}"
    state: directory
    owner: "{{ lab_scheduler_user }}"
    group: "{{ lab_scheduler_user }}"
    mode: "0755"

- name: Clone / update the laboratory repo
  ansible.builtin.git:
    repo: "{{ lab_scheduler_repo_url }}"
    dest: "{{ lab_scheduler_home }}"
    version: "{{ lab_scheduler_repo_version }}"
    force: yes
  become_user: "{{ lab_scheduler_user }}"
  register: _repo

- name: Check for an existing venv
  ansible.builtin.stat:
    path: "{{ lab_scheduler_home }}/.venv/pyvenv.cfg"
  register: _venv

# Re-sync when the repo moved, or when a previous sync never completed —
# gating on _repo.changed alone would skip a half-built venv forever.
- name: Sync the environment (uv sync --extra skypilot --extra r2)
  ansible.builtin.command:
    cmd: /usr/local/bin/uv sync --extra skypilot --extra r2
    chdir: "{{ lab_scheduler_home }}"
  become_user: "{{ lab_scheduler_user }}"
  when: _repo.changed or not _venv.stat.exists
  register: _sync

- name: Vast key directory
  ansible.builtin.file:
    path: "/home/{{ lab_scheduler_user }}/.config/vastai"
    state: directory
    owner: "{{ lab_scheduler_user }}"
    group: "{{ lab_scheduler_user }}"
    mode: "0700"

- name: Vast API key for the service user (sky reads the file, the sdk reads the env)
  ansible.builtin.copy:
    content: "{{ lab_scheduler_vast_api_key }}\n"
    dest: "/home/{{ lab_scheduler_user }}/.config/vastai/vast_api_key"
    owner: "{{ lab_scheduler_user }}"
    group: "{{ lab_scheduler_user }}"
    mode: "0600"
  no_log: yes

- name: /etc/lab directory
  ansible.builtin.file:
    path: /etc/lab
    state: directory
    mode: "0755"

- name: Render scheduler.env (secrets; root-only)
  ansible.builtin.template:
    src: scheduler.env.j2
    dest: /etc/lab/scheduler.env
    owner: root
    group: root
    mode: "0600"
  no_log: yes
  register: _env

- name: Install systemd units from the laboratory repo
  ansible.builtin.copy:
    src: "{{ lab_scheduler_home }}/deploy/scheduler/{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    remote_src: yes
    mode: "0644"
  loop:
    - lab-scheduler.service
    - lab-scheduler.timer
  register: _units

# Steady-state ticks come from the 60s timer; only re-validate
# synchronously when this run actually changed the deployment.
- name: Run one synchronous tick when the deployment changed (fail fast)
  ansible.builtin.systemd:
    name: lab-scheduler.service
    state: started
    daemon_reload: yes
  when: _sync.changed or _env.changed or _units.changed

- name: Enable + start the 60s timer
  ansible.builtin.systemd:
    name: lab-scheduler.timer
    enabled: yes
    state: started
