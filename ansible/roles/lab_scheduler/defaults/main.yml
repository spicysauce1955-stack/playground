---
# Laboratory deferred-scheduler host (contract: laboratory repo
# deploy/scheduler/README.md). Secrets are read from the CONTROLLER at
# configure time (env + key files) and land only in /etc/lab/scheduler.env
# on the target (0600). Never put secret VALUES in this file.

lab_scheduler_repo_url: https://github.com/spicysauce1955-stack/laboratory.git
lab_scheduler_repo_version: main
lab_scheduler_home: /opt/laboratory
lab_scheduler_user: lab

# skypilot imports are memory-hungry for a 1GB droplet — give it headroom.
lab_scheduler_swap_mb: 2048

# --- secrets, resolved on the controller ---------------------------------
lab_scheduler_vast_key_file: "{{ lookup('env', 'HOME') }}/.config/vastai/vast_api_key"
lab_scheduler_r2_credentials_file: "{{ lookup('env', 'HOME') }}/.cloudflare/r2.credentials"

# errors='ignore' turns a missing controller file into an empty value so
# the role's assert can report it with a readable message instead of a
# censored lookup traceback.
lab_scheduler_vast_api_key: >-
  {{ lookup('file', lab_scheduler_vast_key_file, errors='ignore')
     | default('', true) | trim }}
lab_scheduler_r2_endpoint: "{{ lookup('env', 'LAB_R2_ENDPOINT') }}"
lab_scheduler_r2_bucket: "{{ lookup('env', 'LAB_R2_BUCKET') | default('lab-artifacts', true) }}"
lab_scheduler_aws_access_key_id: >-
  {{ lookup('ini', 'aws_access_key_id',
            section='default',
            file=lab_scheduler_r2_credentials_file,
            errors='ignore') | default('', true) }}
lab_scheduler_aws_secret_access_key: >-
  {{ lookup('ini', 'aws_secret_access_key',
            section='default',
            file=lab_scheduler_r2_credentials_file,
            errors='ignore') | default('', true) }}
